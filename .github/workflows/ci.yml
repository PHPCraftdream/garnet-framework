name: CI

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

jobs:
  static:
    name: PHP ${{ matrix.php }} — phpstan + cs-fixer
    runs-on: ubuntu-latest
    # ubuntu-latest ships npm, so a plain `composer install` would otherwise
    # fire the post-install `garnet setup` hook and npm-install FrontBuilder
    # on every PHP job. Suppress the node half here; the frontend/zero-config
    # jobs run it deliberately.
    env:
      GARNET_SKIP_NODE_SETUP: '1'
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4', '8.5']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, json, pdo, mysqli, intl
          coverage: none
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install dependencies
        run: composer update --no-progress --prefer-dist --no-interaction

      - name: Code style (php-cs-fixer)
        run: composer cs:check

      - name: Static analysis (phpstan)
        run: composer phpstan

  kernel-tests:
    name: PHP ${{ matrix.php }} — kahlan Kernel (no DB)
    runs-on: ubuntu-latest
    env:
      GARNET_SKIP_NODE_SETUP: '1'
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4', '8.5']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, json, pdo, mysqli, intl
          coverage: none
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.json') }}

      - name: Install dependencies
        run: composer update --no-progress --prefer-dist --no-interaction

      - name: Kernel specs
        run: composer test:kernel

  bundle-tests:
    name: PHP ${{ matrix.php }} — kahlan Bundle (MySQL)
    runs-on: ubuntu-latest
    env:
      GARNET_SKIP_NODE_SETUP: '1'
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4', '8.5']
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test
          MYSQL_USER: test
          MYSQL_PASSWORD: test
        ports:
          - 3306:3306
        # The default health probe takes ~30 s to flip "healthy"; we wait
        # via mysqladmin below before running tests anyway. Keep this short
        # so a sick container fails fast.
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -proot"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, json, pdo, mysqli, intl
          coverage: none
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.json') }}

      - name: Install dependencies
        run: composer update --no-progress --prefer-dist --no-interaction

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -u test -ptest --silent; then
              echo "MySQL up"; exit 0
            fi
            sleep 2
          done
          echo "MySQL never came up"; exit 1

      - name: Bundle specs
        # TestsInit/TestConfig/db.ini targets host=127.0.0.1 (not
        # "localhost" — PHP/mysqli treats literal "localhost" as a Unix
        # socket request, which fails against Docker service containers),
        # port=3306, user=test, password=test, dbname=test — matches the
        # service container exactly, so no config override is needed.
        run: composer test:bundle

  frontend:
    name: Frontend — oxlint + tsgo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: FrontBuilder/package-lock.json

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, json, pdo, mysqli, intl
          coverage: none
          tools: composer:v2

      # Install PHP deps only; the explicit `garnet setup` below does the
      # node half so we exercise the real installer (npm + the node_modules
      # junction at the framework root that tsgo/oxlint resolve through).
      - name: Install PHP deps
        run: GARNET_SKIP_NODE_SETUP=1 composer install --no-progress --prefer-dist --no-interaction

      - name: Set up frontend toolchain (garnet setup)
        run: php bin/garnet setup --skip-composer

      - name: oxlint + tsgo
        working-directory: FrontBuilder
        run: npm run check

  zero-config:
    name: Zero-config — setup → app:create → build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: FrontBuilder/package-lock.json

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, json, pdo, mysqli, intl
          coverage: none
          tools: composer:v2

      - name: Install PHP deps
        run: GARNET_SKIP_NODE_SETUP=1 composer install --no-progress --prefer-dist --no-interaction

      # The framework installer: FrontBuilder npm + node_modules junction.
      # Idempotent; this is the same command the quickstart documents.
      - name: garnet setup (framework)
        run: php bin/garnet setup --skip-composer

      # Scaffold an app. GARNET_SKIP_NODE_SETUP keeps app:create's own
      # composer install from downloading Playwright browsers in CI; we
      # install the app node deps explicitly (sans browsers) next.
      - name: Scaffold an app from the template
        run: GARNET_SKIP_NODE_SETUP=1 php bin/garnet app:create CiApp --target="${{ runner.temp }}/CiApp"

      - name: App node deps (no Playwright browsers)
        working-directory: ${{ runner.temp }}/CiApp
        run: php garnet setup --skip-composer --skip-playwright

      - name: Build the app (framework FrontBuilder)
        working-directory: ${{ runner.temp }}/CiApp
        run: php garnet build

      - name: Verify built assets
        working-directory: ${{ runner.temp }}/CiApp
        run: php garnet build:check

      - name: App quality gate (cs-fixer + phpstan)
        working-directory: ${{ runner.temp }}/CiApp
        run: composer ci

  e2e:
    name: E2E — setup → app:create → Playwright smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: FrontBuilder/package-lock.json

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, json, pdo, mysqli, intl
          coverage: none
          tools: composer:v2

      - name: Install PHP deps
        run: GARNET_SKIP_NODE_SETUP=1 composer install --no-progress --prefer-dist --no-interaction

      # The framework installer: FrontBuilder npm + node_modules junction.
      - name: garnet setup (framework)
        run: php bin/garnet setup --skip-composer

      # Env::isDevDir() decides "dev mode" (reads WorkDir/ConfigDev/ — the
      # zero-config quickstart defaults) vs "production mode" (reads
      # WorkDir/Config/, empty on a fresh scaffold with no deploy/config:init
      # step) by walking up from Kernel/Core/Env/ looking for an IDE marker
      # dir (.vscode/.idea/etc) — true on any real dev machine, false on a
      # bare CI checkout. Without one, a freshly-scaffolded app 500s on
      # every request (IniConfigException: Wrong file .../WorkDir/Config/
      # db.ini) because nothing ever populated the production Config/ dir.
      # A real local `git clone && composer install` always has an IDE's
      # marker directory somewhere in the tree, so recreate that condition
      # here instead of pretending this is a production deploy.
      - name: Mark framework checkout as a dev directory
        run: mkdir -p .vscode

      # Scaffold an app. GARNET_SKIP_NODE_SETUP keeps app:create's own
      # composer install from downloading Playwright browsers via the
      # post-install hook; we run the app's own `garnet setup` explicitly
      # next, WITHOUT --skip-playwright this time, so the browsers install.
      - name: Scaffold an app from the template
        run: GARNET_SKIP_NODE_SETUP=1 php bin/garnet app:create CiApp --target="${{ runner.temp }}/CiApp"

      - name: App node deps + Playwright browsers
        working-directory: ${{ runner.temp }}/CiApp
        run: php garnet setup --skip-composer

      - name: Build the app (framework FrontBuilder)
        working-directory: ${{ runner.temp }}/CiApp
        run: php garnet build

      # Serve + test in ONE step. A background process started in a separate
      # step does not survive into the next one on GitHub-hosted runners, so
      # the server, the readiness wait, and the Playwright run must share a
      # step. These specs are all DB-free, so no MySQL service is needed.
      #
      # Only a safe subset of the ported framework-bundle specs runs here.
      # The scaffold now wires EmailAuthMiddleware::authOnly onto /account
      # (AccountController — see Application.php::runWebApp; / itself stays
      # public by design), so the other 8 specs under Tests/specs/
      # framework-bundle/ (auth-email-preserved-on-error, auth-magic-link-
      # defer, magic-link, registration-gate, consent-csrf, email-auth,
      # email-link-csrf, cookie-samesite) are no longer blocked by missing
      # auth wiring — verified manually (curl against /account renders the
      # real Auth2 login form). They ARE still excluded from THIS job
      # because they need a real MySQL database (session_data, accounts,
      # mail_log rows via mysql2) and this job runs DB-free with no MySQL
      # service configured. Wiring those in is a separate follow-up (add a
      # MySQL service + run migrations first — note: a pre-existing,
      # unrelated migration-bootstrap issue was found this session where a
      # brand-new DB's `db_migration` tracking table isn't auto-created by
      # `php garnet migration`; investigate that before wiring a DB-backed
      # CI job). Do NOT add these specs to this DB-free job without that
      # MySQL service; doing so will make it red for a reason that isn't a
      # code bug.
      - name: Serve + Playwright smoke suite
        working-directory: ${{ runner.temp }}/CiApp
        run: |
          php garnet serve > /tmp/garnet-serve.log 2>&1 &
          SERVER_PID=$!
          up=0
          for i in $(seq 1 30); do
            if curl --fail --silent http://localhost:8001/ > /dev/null; then up=1; break; fi
            sleep 2
          done
          if [ "$up" != "1" ]; then
            echo "Server did not come up in time." >&2
            echo "--- garnet serve log ---" >&2
            cat /tmp/garnet-serve.log >&2 || true
            echo "--- curl verbose (last attempt) ---" >&2
            curl -v http://localhost:8001/ 2>&1 >&2 || true
            echo "--- PHP error log (if any) ---" >&2
            find WorkDir -iname "*.log" -exec sh -c 'echo "== {} =="; cat "{}"' \; 2>/dev/null || true
            kill "$SERVER_PID" 2>/dev/null || true
            exit 1
          fi
          echo "Server is up — running Playwright."
          npm --prefix Tests test -- \
            specs/smoke.spec.ts \
            specs/framework-bundle/api-no-react-import.spec.ts \
            specs/framework-bundle/cron-cli.spec.ts \
            specs/framework-bundle/html-lang.spec.ts \
            specs/framework-bundle/auth-page-chrome.spec.ts
          status=$?
          kill "$SERVER_PID" 2>/dev/null || true
          exit $status

  dependency-install:
    name: Dependency install — app:create from vendor (no symlink)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: garnet-framework

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, json, pdo, mysqli, intl
          coverage: none
          tools: composer:v2

      # Create a blank Composer project that pulls garnet-framework as a
      # normal dependency — NOT a symlinked path repo.  symlink:false makes
      # Composer physically copy the files into vendor/, which is the closest
      # approximation of a real Packagist install without network access.
      - name: Create consumer project
        run: |
          mkdir -p "${{ runner.temp }}/consumer"
          cd "${{ runner.temp }}/consumer"
          composer init \
            --name=test/consumer \
            --description="CI consumer project" \
            --stability=dev \
            --no-interaction
          composer config repositories.local \
            '{"type":"path","url":"'"$GITHUB_WORKSPACE/garnet-framework"'","options":{"symlink":false}}'
          composer config minimum-stability dev
          composer config prefer-stable true

      - name: Install garnet-framework as dependency
        working-directory: ${{ runner.temp }}/consumer
        run: |
          GARNET_SKIP_NODE_SETUP=1 composer require phpcraftdream/garnet-framework:@dev --no-interaction --no-progress

      - name: Mark checkout as dev directory
        run: mkdir -p "$GITHUB_WORKSPACE/garnet-framework/.vscode"

      # Scaffold an app via the vendor-installed CLI (not the checkout).
      - name: Scaffold TestApp via vendor/bin/garnet
        working-directory: ${{ runner.temp }}/consumer
        run: |
          GARNET_SKIP_NODE_SETUP=1 php vendor/bin/garnet app:create TestApp --target="${{ runner.temp }}/TestApp"

      # Remove the original checkout to prove TestApp is self-contained.
      - name: Remove framework checkout (prove independence)
        run: rm -rf "$GITHUB_WORKSPACE/garnet-framework"

      # Re-install TestApp deps — must succeed without the bootstrap checkout.
      - name: composer install in TestApp (no bootstrap)
        working-directory: ${{ runner.temp }}/TestApp
        run: GARNET_SKIP_NODE_SETUP=1 composer install --no-progress --no-interaction

      - name: Setup TestApp frontend
        working-directory: ${{ runner.temp }}/TestApp
        run: php garnet setup --skip-composer --skip-playwright

      - name: Build TestApp
        working-directory: ${{ runner.temp }}/TestApp
        run: php garnet build

      - name: Verify built assets
        working-directory: ${{ runner.temp }}/TestApp
        run: php garnet build:check
